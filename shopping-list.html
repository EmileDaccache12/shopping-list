<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emile's Shopping List Website</title>

    <style>
        #body-div {
            background-color: rgb(207, 78, 227);
            background-image: linear-gradient(to bottom right, rgb(140, 30, 242), rgb(164, 61, 180), rgb(170, 48, 162));
            min-height: 95vh;
            width: auto;
            padding: 30px;  
        }

        #container {
            margin: auto;
            padding: 3px;
            border: 4px solid rgb(240, 240, 198);
            border-radius: 15px;
            background-color: rgb(245, 245, 198);
            width: auto;
            max-width: 472px;
            height: 85vh;
            min-height: 560px;
        }

        #cart-button {
            float: right;
            width: 60px;
            height: auto;
            border: 0;
            padding: 0%;
            background-color: rgb(245, 245, 198);
        }

        #cart-button:hover {
            transform: scale(1.04);
            cursor: pointer;
        }

        #cart-icon {
            width: 100%;
            height: auto;
            border-radius: 100%;
        }

        #cart-icon:hover {
            border: 2.4px solid black;
        }

        #counter {
            padding: 0%;
            margin:0;
            color: red;
            float: right;
            position: absolute;
            font-size: large;
        }
        
        #content {
            margin-top: 175px;
        }

        #stack {
            display: flex;
            flex-direction: column;
            max-width: 70%;
            margin: auto;
        }

        #user-input {
            font-size: x-large;
            border-radius: 15px;
            height: 60px;
            border: 2px solid rgb(111, 0, 133);
        }

        #save {
            font-size: 125%;
            border-radius: 13px;
            background-color: rgb(198, 71, 227);
        }

        #save:hover {
            cursor: pointer;
            transform: scale(1.021);
        }

        #cart-div {
            position: fixed;
            top: 1;
            left: 0;
            width: 280px;
            height: 80vh;
            background-color: white;
            z-index: 999;
            border: 2px solid rgb(72, 72, 72);
            display: none;
            flex-direction: column;
        }

        #cart-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        #header {
            display: block;
        }

        #close-cart {
            color: black;
            font-size: x-large;
            float: right;
            margin: 4px;
        }

        #close-cart:hover , #clear-all:hover {
            transform: scale(1.046);
            cursor: pointer;
        }

        #clear-all {
            color: black;
            font-size: x-large;
            float: left;
            margin: 4px;
        }

        #sub-content {
            text-align: center;
            color: rgb(111, 0, 133);
        }

        @media (max-width: 400px) {
            #container {
                max-height: 450px;
            }

            #content {
                margin-top: 130px;
            }

            #title {
                font-size: 170%;
            }
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded" , function() {
            const close_cart = document.getElementById("close-cart");
            const cart_div = document.getElementById("cart-div");

            cart_div.style.display = "none"

            document.getElementById("cart-button").addEventListener("click" , function() {
                if (cart_div.style.display === "none") {
                    cart_div.style.display = "flex";
                }
                else if (cart_div.style.display === "flex") {
                    cart_div.style.display = "none";
                }
            });

            close_cart.addEventListener("click" , function() {
                cart_div.style.display = "none";
            });

            const user_input = document.getElementById("user-input");
            const save = document.getElementById("save");
            const counter = document.getElementById("counter");
            const cart_content = document.getElementById("cart-content");

            let items = [];

            items = JSON.parse(localStorage.getItem("items")) || [];

            function render() {
                cart_content.innerHTML = "";

                items.forEach(function(item) {
                    const h2 = document.createElement("h2");
                    h2.innerText = item;
                    cart_content.appendChild(h2);
                });

                counter.innerText = items.length;
            }

            render();

            save.addEventListener("click" , function() {
                const value = user_input.value.trim();
                
                if (value === "") return;

                items.push(value);
                user_input.value = "";

                localStorage.setItem("items", JSON.stringify(items));

                render();
            });

            const clear_all = document.getElementById("clear-all");

            clear_all.addEventListener("click", function () {
                items = [];
                localStorage.removeItem("items");
                render();
            });
        });
    </script>
</head>
<body>
    <div id="body-div">
        <div id="cart-div">
            <div id="header">
                <button id="clear-all">clear list</button>
                <button id="close-cart"><b>x</b></button>
            </div>

            <div id="cart-content"></div>
        </div>

        <div id="container">
            <button id="cart-button">
                <p id="counter"><b>0</b></p>
                <img src="shopping cart img.jpeg" alt="cart" id="cart-icon">
            </button>
            
            <h1 id="title"><b><u>SHOPPING LIST:</u></b></h1>

            <div id="content">
                <div id="stack">
                    <label for="input">- type your items here:</label>
                    <input type="text" placeholder="ex: watermellon" id="user-input"><br>
                    <button id="save"><b>Add To List</b></button>
                </div>
                <div id="sub-content">
                    <br><br><br>
                    <h2>Go to the shopping cart to see what you've added</h2>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
